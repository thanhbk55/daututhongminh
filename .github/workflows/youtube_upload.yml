name: YouTube Upload

on:
  workflow_dispatch:
    inputs:
      sheet_row:
        description: "Row number in sheet aaa1 (e.g. 2)"
        required: true
      yt_privacy:
        description: "private|unlisted|public"
        required: false
        default: "private"
      video_mode:
        description: "normal|short"
        required: false
        default: "normal"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.sheet.outputs.should_run }}
      sheet_row: ${{ steps.sheet.outputs.sheet_row }}
      gdrive_rel_path: ${{ steps.sheet.outputs.gdrive_rel_path }}
      yt_title: ${{ steps.sheet.outputs.yt_title }}
      yt_description: ${{ steps.sheet.outputs.yt_description }}
      yt_privacy: ${{ steps.sheet.outputs.yt_privacy }}

    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i googleapis@^140

      - name: Read row from Google Sheet
        id: sheet
        env:
          SHEET_ROW: ${{ inputs.sheet_row }}
          VIDEO_MODE: ${{ inputs.video_mode }}
          YT_PRIVACY_INPUT: ${{ inputs.yt_privacy }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { google } = require("googleapis");

          function setOutput(name, value) {
            const safe = String(value ?? "").replace(/\r/g, "");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}<<__EOF__\n${safe}\n__EOF__\n`);
          }

          async function main() {
            const clientId = process.env.GOOGLE_CLIENT_ID;
            const clientSecret = process.env.GOOGLE_CLIENT_SECRET;
            const refreshToken = process.env.GOOGLE_REFRESH_TOKEN;
            const rowNumber = String(process.env.SHEET_ROW || "").trim();
            const videoMode = String(process.env.VIDEO_MODE || "normal").trim().toLowerCase();
            const ytPrivacy = String(process.env.YT_PRIVACY_INPUT || "private").trim().toLowerCase();

            if (!clientId || !clientSecret || !refreshToken) {
              throw new Error("Missing GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_REFRESH_TOKEN");
            }
            if (!rowNumber) throw new Error("Missing sheet_row input");
            if (!/^\d+$/.test(rowNumber)) throw new Error(`Invalid sheet_row: ${rowNumber}`);
            if (Number(rowNumber) < 1) throw new Error(`sheet_row must be >= 1: ${rowNumber}`);
            if (!["normal", "short"].includes(videoMode)) {
              throw new Error(`Invalid video_mode: ${videoMode}`);
            }
            if (!["private", "unlisted", "public"].includes(ytPrivacy)) {
              throw new Error(`Invalid yt_privacy: ${ytPrivacy}`);
            }

            const oauth2 = new google.auth.OAuth2(clientId, clientSecret);
            oauth2.setCredentials({ refresh_token: refreshToken });

            const sheets = google.sheets({ version: "v4", auth: oauth2 });
            const spreadsheetId = "1b2quaeYZP2BNFKKrW5pMlO75NSA-IzVs04PZkLEZCHo";
            const range = `aaa1!A${rowNumber}:P${rowNumber}`;

            const res = await sheets.spreadsheets.values.get({
              spreadsheetId,
              range,
            });

            const row = res.data.values?.[0];
            if (!row) {
              throw new Error(`No data found at row ${rowNumber}`);
            }

            const videoNumber = String(row[0] || "").trim(); // A
            const ytTitle = String(row[1] || "").trim();     // B
            const desc = String(row[2] || "").trim();        // C
            const hashtag = String(row[3] || "").trim();     // D
            const status = String(row[15] || "").trim();     // P

            if (status !== "REVIEW OK") {
              console.log(`Skip row ${rowNumber}: status is "${status}", expected "REVIEW OK"`);
              setOutput("should_run", "false");
              setOutput("sheet_row", rowNumber);
              setOutput("gdrive_rel_path", "");
              setOutput("yt_title", "");
              setOutput("yt_description", "");
              setOutput("yt_privacy", ytPrivacy);
              return;
            }

            if (!videoNumber) {
              throw new Error(`Column A (video number) is required at row ${rowNumber}`);
            }
            if (!ytTitle) {
              throw new Error(`Column B (video title) is required at row ${rowNumber}`);
            }

            const fileName = videoMode === "short" ? "tiktok.mp4" : "youtube.mp4";
            const gdriveRelPath = `video${videoNumber}/${fileName}`;
            const ytDescription = [desc, hashtag].filter(Boolean).join("\n\n");

            setOutput("should_run", "true");
            setOutput("sheet_row", rowNumber);
            setOutput("gdrive_rel_path", gdriveRelPath);
            setOutput("yt_title", ytTitle);
            setOutput("yt_description", ytDescription);
            setOutput("yt_privacy", ytPrivacy);

            console.log("Read sheet row OK:", rowNumber);
            console.log("video_mode:", videoMode);
            console.log("gdrive_rel_path:", gdriveRelPath);
            console.log("yt_title:", ytTitle);
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

  download:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}

    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      GDRIVE_FOLDER_ID: "1gQdENPC3hXdTrKLXzhigQw47zh3J9U6h"
      OUT_PATH: "out/video.mp4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i googleapis@^140

      - name: Download from Google Drive
        env:
          GDRIVE_REL_PATH: ${{ needs.prepare.outputs.gdrive_rel_path }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const { google } = require("googleapis");

          const clientId = process.env.GOOGLE_CLIENT_ID;
          const clientSecret = process.env.GOOGLE_CLIENT_SECRET;
          const refreshToken = process.env.GOOGLE_REFRESH_TOKEN;

          const rootFolderId = process.env.GDRIVE_FOLDER_ID;
          const relPath = process.env.GDRIVE_REL_PATH;
          const outPath = process.env.OUT_PATH || "out/video.mp4";

          if (!clientId || !clientSecret || !refreshToken) {
            throw new Error("Missing GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_REFRESH_TOKEN");
          }
          if (!rootFolderId) throw new Error("Missing GDRIVE_FOLDER_ID");
          if (!relPath) throw new Error("Missing gdrive_rel_path");

          const parts = relPath.split("/").filter(Boolean);
          if (parts.length < 1) throw new Error(`Invalid gdrive_rel_path: ${relPath}`);

          const oauth2 = new google.auth.OAuth2(clientId, clientSecret);
          oauth2.setCredentials({ refresh_token: refreshToken });
          const drive = google.drive({ version: "v3", auth: oauth2 });

          async function findChild(parentId, name, mimeType) {
            const res = await drive.files.list({
              q: `'${parentId}' in parents and trashed = false`,
              fields: "files(id,name,mimeType)",
              pageSize: 100,
              supportsAllDrives: true,
              includeItemsFromAllDrives: true,
            });

            const files = res.data.files || [];
            return files.find((f) => {
              if (f.name !== name) return false;
              if (mimeType && f.mimeType !== mimeType) return false;
              return true;
            }) || null;
          }

          async function main() {
            let currentFolderId = rootFolderId;

            for (let i = 0; i < parts.length - 1; i++) {
              const folderName = parts[i];
              const folder = await findChild(
                currentFolderId,
                folderName,
                "application/vnd.google-apps.folder"
              );
              if (!folder) {
                throw new Error(`Folder not found: ${folderName} under parent ${currentFolderId} for relPath=${relPath}`);
              }
              currentFolderId = folder.id;
            }

            const fileName = parts[parts.length - 1];
            const file = await findChild(currentFolderId, fileName, null);
            if (!file) {
              throw new Error(`File not found: ${fileName} under parent ${currentFolderId} for relPath=${relPath}`);
            }

            fs.mkdirSync(path.dirname(outPath), { recursive: true });
            const dest = fs.createWriteStream(outPath);

            const res = await drive.files.get(
              { fileId: file.id, alt: "media", supportsAllDrives: true },
              { responseType: "stream" }
            );

            await new Promise((resolve, reject) => {
              res.data.on("error", reject);
              dest.on("finish", resolve);
              dest.on("error", reject);
              res.data.pipe(dest);
            });

            const stat = fs.statSync(outPath);
            console.log("Downloaded OK:", outPath);
            console.log("Drive fileId:", file.id);
            console.log("Size:", stat.size);
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Verify file
        run: |
          ls -lah out
          file out/video.mp4 || true

      - name: Trim video if mode=short (<= 179s)
        if: ${{ inputs.video_mode == 'short' }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y ffmpeg

          IN="out/video.mp4"
          OUT="out/video_trim.mp4"
          TRIM_SEC="179"

          echo "Trim to ${TRIM_SEC}s for Shorts..."
          ffmpeg -hide_banner -y -i "$IN" -t "$TRIM_SEC" -c copy "$OUT" || \
          ffmpeg -hide_banner -y -i "$IN" -t "$TRIM_SEC" -c:v libx264 -preset veryfast -crf 23 -c:a aac -b:a 128k "$OUT"

          mv -f "$OUT" "$IN"

          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$IN" || true
          ls -lah out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: out/video.mp4

  upload:
    runs-on: ubuntu-latest
    needs: [prepare, download]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}

    env:
      SHEET_ROW: ${{ needs.prepare.outputs.sheet_row }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: video-file
          path: out

      - name: Verify artifact
        run: |
          find . -maxdepth 4 -type f | sort
          ls -lah out || true
          file out/video.mp4 || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i googleapis@^140

      - name: Upload to YouTube (Node stream, no OOM)
        env:
          YT_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          YT_TITLE: ${{ needs.prepare.outputs.yt_title }}
          YT_DESCRIPTION: ${{ needs.prepare.outputs.yt_description }}
          YT_PRIVACY: ${{ needs.prepare.outputs.yt_privacy }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { google } = require("googleapis");

          async function main() {
            let privacy = (process.env.YT_PRIVACY || "private").toLowerCase();
            if (!["private", "unlisted", "public"].includes(privacy)) {
              throw new Error(`Invalid yt_privacy: ${privacy}`);
            }

            const oauth2 = new google.auth.OAuth2(
              process.env.YT_CLIENT_ID,
              process.env.YT_CLIENT_SECRET
            );
            oauth2.setCredentials({ refresh_token: process.env.YT_REFRESH_TOKEN });

            const youtube = google.youtube({ version: "v3", auth: oauth2 });

            const videoPath = "out/video.mp4";
            if (!fs.existsSync(videoPath)) {
              throw new Error(`Video not found: ${videoPath}`);
            }

            const res = await youtube.videos.insert({
              part: ["snippet", "status"],
              notifySubscribers: false,
              requestBody: {
                snippet: {
                  title: process.env.YT_TITLE,
                  description: process.env.YT_DESCRIPTION,
                  categoryId: "22",
                },
                status: {
                  privacyStatus: privacy,
                },
              },
              media: {
                body: fs.createReadStream(videoPath),
              },
            });

            const videoId = res.data.id;
            const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;

            fs.appendFileSync(process.env.GITHUB_ENV, `VIDEO_URL=${videoUrl}\n`);

            console.log("Uploaded video ID:", videoId);
            console.log("URL:", videoUrl);
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Update Google Sheet (P=row => YOUTUBE DONE, W=row => URL)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          VIDEO_URL: ${{ env.VIDEO_URL }}
        run: |
          node <<'NODE'
          const { google } = require("googleapis");

          async function main() {
            const clientId = process.env.GOOGLE_CLIENT_ID;
            const clientSecret = process.env.GOOGLE_CLIENT_SECRET;
            const refreshToken = process.env.GOOGLE_REFRESH_TOKEN;
            const row = String(process.env.SHEET_ROW || "").trim();
            const videoUrl = String(process.env.VIDEO_URL || "").trim();

            if (!row) throw new Error("Missing SHEET_ROW");
            if (!videoUrl) throw new Error("Missing VIDEO_URL");

            const oauth2 = new google.auth.OAuth2(clientId, clientSecret);
            oauth2.setCredentials({ refresh_token: refreshToken });

            const sheets = google.sheets({ version: "v4", auth: oauth2 });
            const spreadsheetId = "1b2quaeYZP2BNFKKrW5pMlO75NSA-IzVs04PZkLEZCHo";

            await sheets.spreadsheets.values.batchUpdate({
              spreadsheetId,
              requestBody: {
                valueInputOption: "RAW",
                data: [
                  {
                    range: `aaa1!P${row}`,
                    values: [["YOUTUBE DONE"]],
                  },
                  {
                    range: `aaa1!W${row}`,
                    values: [[videoUrl]],
                  },
                ],
              },
            });

            console.log(`Sheet updated: P${row}=YOUTUBE DONE, W${row}=${videoUrl}`);
          }

          main().catch((e) => {
            console.error(e.response?.data || e);
            process.exit(1);
          });
          NODE

  skipped:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run != 'true' }}
    steps:
      - name: Skip message
        run: echo "Skipped because column P is not REVIEW OK"
